# Nginx routing equivalent for the current page layout.
# Assumes server root points to the repository root.

# Existing files are served directly.
location / {
    try_files $uri $uri/ @page_routes;
}

# Root URL should load the canonical index page.
location = / {
    rewrite ^ /public/pages/index.php last;
}

# Route legacy /<page>.php URLs to /public/pages/<page>.php when a root file does not exist.
location @page_routes {
    rewrite ^/([A-Za-z0-9\-]+\.php)$ /public/pages/$1 last;
    return 404;
}

# Pass PHP scripts to PHP-FPM.
location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php/php-fpm.sock;
}

